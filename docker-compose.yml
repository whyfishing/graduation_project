services:
  mysql:
    image: mysql:8.0
    container_name: music-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: music_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: music-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: music-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-lc", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  api-service:
    build:
      context: ./api-service
    container_name: music-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/music_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8080
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-qwen-plus}
    ports:
      - "8080:8080"

  spark-job:
    build:
      context: ./spark-job
    container_name: music-spark-job
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: music_system
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: music_play_event
    restart: unless-stopped

  netease-collector:
    build:
      context: ./spark-job
    container_name: music-netease-collector
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: music_system
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      NETEASE_TOPLIST_API: https://music.163.com/api/toplist/detail
      NETEASE_PLAYLIST_DETAIL_API: https://music.163.com/api/v6/playlist/detail
      NETEASE_SSL_VERIFY: "false"
      NETEASE_TOP_LIMIT: 10
      NETEASE_TRACK_LIMIT: 100
    command:
      [
        "sh",
        "-c",
        "while true; do python collect_netease_platform_data.py --top-limit ${NETEASE_TOP_LIMIT:-10} --track-limit ${NETEASE_TRACK_LIMIT:-100}; sleep 86400; done",
      ]
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: music-frontend
    depends_on:
      - api-service
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  mysql_data:
